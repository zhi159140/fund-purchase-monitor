name: Fund Purchase Monitor

on:
  schedule:
    - cron: "0 1,5,9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      TTF_API_KEY: ${{ secrets.TTF_API_KEY }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fund purchase monitor
        run: python fund_purchase_monitor.py

      - name: Commit state and result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add fund_purchase_baseline.json fund_purchase_monitor_result.json || true
          git diff --cached --quiet || git commit -m "update fund purchase monitor state"
          git push
